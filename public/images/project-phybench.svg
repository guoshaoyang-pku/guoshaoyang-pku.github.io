<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#f6f4f0"/>
  <!-- Abstract neural network pattern -->
  <g opacity="0.08">
    <circle cx="200" cy="100" r="6" fill="#1e3a5f"/>
    <circle cx="300" cy="80" r="6" fill="#1e3a5f"/>
    <circle cx="250" cy="160" r="6" fill="#1e3a5f"/>
    <circle cx="400" cy="120" r="6" fill="#1e3a5f"/>
    <circle cx="350" cy="180" r="6" fill="#1e3a5f"/>
    <line x1="200" y1="100" x2="300" y2="80" stroke="#1e3a5f" stroke-width="0.8"/>
    <line x1="200" y1="100" x2="250" y2="160" stroke="#1e3a5f" stroke-width="0.8"/>
    <line x1="300" y1="80" x2="400" y2="120" stroke="#1e3a5f" stroke-width="0.8"/>
    <line x1="250" y1="160" x2="350" y2="180" stroke="#1e3a5f" stroke-width="0.8"/>
  </g>
  <!-- Benchmark visualization -->
  <g transform="translate(80, 160)">
    <!-- Card 1: Checkmark -->
    <rect width="190" height="120" rx="10" fill="white" stroke="#1e3a5f" stroke-opacity="0.1"/>
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a5f">500 Original Problems</text>
    <text x="20" y="60" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#1e3a5f">500</text>
    <text x="20" y="85" font-family="Inter, sans-serif" font-size="11" fill="#57534e">physics problems</text>
    <text x="20" y="105" font-family="Inter, sans-serif" font-size="11" fill="#57534e">by 178 PKU students</text>
  </g>
  <g transform="translate(300, 160)">
    <rect width="190" height="120" rx="10" fill="white" stroke="#1e3a5f" stroke-opacity="0.1"/>
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c2410c">Submitted</text>
    <text x="20" y="65" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#1e3a5f">NeurIPS</text>
    <text x="20" y="90" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#1e3a5f">2025</text>
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="11" fill="#57534e">under review</text>
  </g>
  <g transform="translate(520, 160)">
    <rect width="190" height="120" rx="10" fill="white" stroke="#1e3a5f" stroke-opacity="0.1"/>
    <text x="20" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a5f">Evaluation Method</text>
    <text x="20" y="62" font-family="Inter, sans-serif" font-size="13" fill="#57534e">Expression-level</text>
    <text x="20" y="82" font-family="Inter, sans-serif" font-size="13" fill="#57534e">symbolic scoring</text>
    <text x="20" y="105" font-family="Inter, sans-serif" font-size="11" fill="#a8a29e">with partial credit</text>
  </g>
  <!-- Title area -->
  <text x="400" y="65" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#1e3a5f" text-anchor="middle">PHYBench — Physics Reasoning Benchmark</text>
  <text x="400" y="95" font-family="Inter, sans-serif" font-size="13" fill="#57534e" text-anchor="middle">Holistic Evaluation of Physical Perception and Reasoning in LLMs</text>
  <!-- Bottom bar chart preview -->
  <g transform="translate(80, 330)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#a8a29e">Model comparison (accuracy %)</text>
    <rect x="0" y="15" width="420" height="8" rx="4" fill="#f0eee9"/>
    <rect x="0" y="15" width="180" height="8" rx="4" fill="#1e3a5f" opacity="0.7"/>
    <rect x="0" y="30" width="420" height="8" rx="4" fill="#f0eee9"/>
    <rect x="0" y="30" width="310" height="8" rx="4" fill="#1e3a5f" opacity="0.85"/>
    <rect x="0" y="45" width="420" height="8" rx="4" fill="#f0eee9"/>
    <rect x="0" y="45" width="260" height="8" rx="4" fill="#c2410c" opacity="0.7"/>
    <rect x="0" y="60" width="420" height="8" rx="4" fill="#f0eee9"/>
    <rect x="0" y="60" width="145" height="8" rx="4" fill="#1e3a5f" opacity="0.5"/>
    <text x="440" y="22" font-family="Inter, sans-serif" font-size="9" fill="#57534e">GPT-4o</text>
    <text x="440" y="37" font-family="Inter, sans-serif" font-size="9" fill="#57534e">Claude 3.5</text>
    <text x="440" y="52" font-family="Inter, sans-serif" font-size="9" fill="#57534e">Gemini Pro</text>
    <text x="440" y="67" font-family="Inter, sans-serif" font-size="9" fill="#57534e">Llama 3</text>
  </g>
</svg>
