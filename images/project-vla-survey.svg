<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#f5f4f2"/>
  <!-- Taxonomy tree structure -->
  <g transform="translate(400, 100)">
    <!-- Root -->
    <rect x="-80" y="-25" width="160" height="50" rx="10" fill="#1e3a5f"/>
    <text y="5" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">VLA Models</text>
    <!-- Branches -->
    <line x1="-100" y1="30" x2="-200" y2="80" stroke="#1e3a5f" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="30" x2="0" y2="80" stroke="#1e3a5f" stroke-width="1.2" opacity="0.4"/>
    <line x1="100" y1="30" x2="200" y2="80" stroke="#1e3a5f" stroke-width="1.2" opacity="0.4"/>
    <!-- Child 1 -->
    <rect x="-270" y="80" width="140" height="45" rx="8" fill="white" stroke="#2d5986" stroke-width="1.2"/>
    <text x="-200" y="107" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#1e3a5f" text-anchor="middle">Discrete Tokens</text>
    <!-- Child 2 (highlighted) -->
    <rect x="-70" y="80" width="140" height="45" rx="8" fill="white" stroke="#c2410c" stroke-width="2"/>
    <text x="0" y="107" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c2410c" text-anchor="middle">Raw Action</text>
    <!-- Child 3 -->
    <rect x="130" y="80" width="140" height="45" rx="8" fill="white" stroke="#2d5986" stroke-width="1.2"/>
    <text x="200" y="107" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#1e3a5f" text-anchor="middle">Latent Action</text>
  </g>
  <!-- Paper stack -->
  <g transform="translate(100, 280)">
    <rect x="4" y="4" width="250" height="30" rx="6" fill="#e8e6e1"/>
    <rect x="2" y="2" width="250" height="30" rx="6" fill="#f0eee9"/>
    <rect width="250" height="30" rx="6" fill="white" stroke="#1e3a5f" stroke-opacity="0.1"/>
    <text x="20" y="20" font-family="Inter, sans-serif" font-size="10" fill="#57534e">30+ papers reviewed in Raw Action chapter</text>
  </g>
  <!-- Right side: key insight -->
  <g transform="translate(430, 270)">
    <rect width="280" height="100" rx="12" fill="white" stroke="#1e3a5f" stroke-opacity="0.1"/>
    <text x="20" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#c2410c">KEY INSIGHT</text>
    <text x="20" y="52" font-family="Inter, sans-serif" font-size="12" fill="#1e3a5f">Action tokenization determines</text>
    <text x="20" y="70" font-family="Inter, sans-serif" font-size="12" fill="#1e3a5f">model interface & capabilities</text>
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="10" fill="#a8a29e">arXiv:2507.01925</text>
  </g>
  <!-- Title -->
  <text x="400" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#1e3a5f" text-anchor="middle">VLA Survey — Action Tokenization Perspective</text>
</svg>
