<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f4f7f6"/>
  <!-- Network/connection lines -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.12">
    <line x1="100" y1="300" x2="300" y2="200"/>
    <line x1="100" y1="300" x2="300" y2="400"/>
    <line x1="300" y1="200" x2="500" y2="300"/>
    <line x1="300" y1="400" x2="500" y2="300"/>
    <line x1="500" y1="300" x2="700" y2="200"/>
    <line x1="500" y1="300" x2="700" y2="400"/>
  </g>
  <!-- Vision node -->
  <g transform="translate(100, 300)">
    <circle r="50" fill="white" stroke="#2d5986" stroke-width="2"/>
    <text y="5" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1e3a5f" text-anchor="middle">Vision</text>
  </g>
  <!-- Language node -->
  <g transform="translate(300, 200)">
    <circle r="45" fill="white" stroke="#2d5986" stroke-width="2"/>
    <text y="5" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1e3a5f" text-anchor="middle">Language</text>
  </g>
  <!-- Action node -->
  <g transform="translate(300, 400)">
    <circle r="45" fill="white" stroke="#c2410c" stroke-width="2"/>
    <text y="5" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#c2410c" text-anchor="middle">Action</text>
  </g>
  <!-- VLA Model (center) -->
  <g transform="translate(500, 300)">
    <rect x="-70" y="-40" width="140" height="80" rx="12" fill="#1e3a5f"/>
    <text y="5" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">VLA Model</text>
  </g>
  <!-- Output: Robot -->
  <g transform="translate(700, 200)">
    <circle r="35" fill="white" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text y="5" font-family="Inter, sans-serif" font-size="11" fill="#57534e" text-anchor="middle">Robot</text>
  </g>
  <!-- Output: Agent -->
  <g transform="translate(700, 400)">
    <circle r="35" fill="white" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text y="5" font-family="Inter, sans-serif" font-size="11" fill="#57534e" text-anchor="middle">Agent</text>
  </g>
  <!-- Title -->
  <text x="400" y="80" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#1e3a5f" text-anchor="middle">Vision-Language-Action Models</text>
  <text x="400" y="112" font-family="Inter, sans-serif" font-size="14" fill="#57534e" text-anchor="middle">An Action Tokenization Perspective</text>
  <!-- Legend -->
  <g transform="translate(50, 520)">
    <rect width="200" height="50" rx="8" fill="white" stroke="#1e3a5f" stroke-opacity="0.1"/>
    <circle cx="25" cy="25" r="8" fill="#2d5986"/>
    <text x="40" y="29" font-family="Inter, sans-serif" font-size="11" fill="#57534e">Modality</text>
    <circle cx="110" cy="25" r="8" fill="#c2410c"/>
    <text x="125" y="29" font-family="Inter, sans-serif" font-size="11" fill="#57534e">Raw Action</text>
  </g>
</svg>
