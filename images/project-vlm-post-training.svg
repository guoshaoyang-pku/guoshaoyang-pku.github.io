<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <rect width="800" height="450" fill="#f4f7f6"/>
  <!-- Pipeline flow -->
  <g transform="translate(60, 180)">
    <!-- Step 1: Data -->
    <rect width="130" height="90" rx="10" fill="white" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="65" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a5f" text-anchor="middle">Raw Data</text>
    <text x="65" y="55" font-family="Inter, sans-serif" font-size="10" fill="#57534e" text-anchor="middle">Textbooks</text>
    <text x="65" y="70" font-family="Inter, sans-serif" font-size="10" fill="#57534e" text-anchor="middle">100M+ QA</text>
    <!-- Arrow -->
    <path d="M140 45 L170 45" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- Step 2: BoN -->
    <rect x="180" width="130" height="90" rx="10" fill="white" stroke="#c2410c" stroke-width="1.5"/>
    <text x="245" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c2410c" text-anchor="middle">BoN Scoring</text>
    <text x="245" y="55" font-family="Inter, sans-serif" font-size="10" fill="#57534e" text-anchor="middle">Quality Filter</text>
    <text x="245" y="70" font-family="Inter, sans-serif" font-size="10" fill="#57534e" text-anchor="middle">Prob. Model</text>
    <!-- Arrow -->
    <path d="M320 45 L350 45" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- Step 3: Training -->
    <rect x="360" width="130" height="90" rx="10" fill="white" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="425" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a5f" text-anchor="middle">Multi-Stage</text>
    <text x="425" y="55" font-family="Inter, sans-serif" font-size="10" fill="#57534e" text-anchor="middle">RL + SFT</text>
    <text x="425" y="70" font-family="Inter, sans-serif" font-size="10" fill="#57534e" text-anchor="middle">Mid-training</text>
    <!-- Arrow -->
    <path d="M500 45 L530 45" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow)"/>
    <!-- Step 4: Eval -->
    <rect x="540" width="130" height="90" rx="10" fill="#1e3a5f"/>
    <text x="605" y="35" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">STEM Eval</text>
    <text x="605" y="55" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Benchmarks</text>
    <text x="605" y="70" font-family="Inter, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">↑ Performance</text>
  </g>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="400" y="65" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#1e3a5f" text-anchor="middle">VLM Post-Training Pipeline</text>
  <text x="400" y="95" font-family="Inter, sans-serif" font-size="13" fill="#57534e" text-anchor="middle">Data-Centric Optimization for STEM Reasoning</text>
  <!-- Bottom metrics -->
  <g transform="translate(120, 330)">
    <rect width="560" height="70" rx="10" fill="white" stroke="#1e3a5f" stroke-opacity="0.08"/>
    <text x="30" y="30" font-family="Inter, sans-serif" font-size="10" fill="#a8a29e">Key Results</text>
    <text x="30" y="52" font-family="Inter, sans-serif" font-size="12" fill="#57534e">Disproved equilibrium-based sampling • Probabilistic quality model • CoT compression</text>
  </g>
</svg>
