<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f0eff8"/>
  <!-- Abstract physics equations pattern -->
  <g opacity="0.06">
    <circle cx="150" cy="200" r="120" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="350" cy="350" r="90" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="600" cy="180" r="160" stroke="#1e3a5f" stroke-width="1.5"/>
    <circle cx="500" cy="450" r="100" stroke="#1e3a5f" stroke-width="1.5"/>
  </g>
  <!-- Stylized chart bars -->
  <g transform="translate(100, 380)">
    <rect x="0" y="-120" width="40" height="120" rx="4" fill="#1e3a5f" opacity="0.7"/>
    <rect x="60" y="-180" width="40" height="180" rx="4" fill="#1e3a5f" opacity="0.8"/>
    <rect x="120" y="-90" width="40" height="90" rx="4" fill="#1e3a5f" opacity="0.5"/>
    <rect x="180" y="-200" width="40" height="200" rx="4" fill="#1e3a5f" opacity="0.9"/>
    <rect x="240" y="-140" width="40" height="140" rx="4" fill="#c2410c" opacity="0.7"/>
    <rect x="300" y="-160" width="40" height="160" rx="4" fill="#1e3a5f" opacity="0.6"/>
    <rect x="360" y="-60" width="40" height="60" rx="4" fill="#1e3a5f" opacity="0.4"/>
  </g>
  <!-- Physics formulas -->
  <text x="500" y="280" font-family="Georgia, serif" font-size="28" fill="#1e3a5f" opacity="0.4">F = ma</text>
  <text x="520" y="340" font-family="Georgia, serif" font-size="22" fill="#1e3a5f" opacity="0.3">∇×E = -∂B/∂t</text>
  <text x="480" y="400" font-family="Georgia, serif" font-size="20" fill="#1e3a5f" opacity="0.25">ℒ = T - V</text>
  <!-- Title -->
  <text x="400" y="100" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#1e3a5f" text-anchor="middle">PHYBench</text>
  <text x="400" y="135" font-family="Inter, sans-serif" font-size="16" fill="#57534e" text-anchor="middle">Physics Reasoning Evaluation for LLMs</text>
  <!-- Score indicator -->
  <g transform="translate(580, 420)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="white" stroke="#1e3a5f" stroke-opacity="0.15"/>
    <text x="80" y="35" font-family="Inter, sans-serif" font-size="12" fill="#57534e" text-anchor="middle">Accuracy Score</text>
    <text x="80" y="62" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#c2410c" text-anchor="middle">42.3%</text>
  </g>
</svg>
